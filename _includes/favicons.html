{% capture favicon_path %}{{ '/assets/favicon' | relative_url }}{% endcapture %}
{% capture favicon_version %}?v={{ site.time | date: '%s' }}{% endcapture %}

<link rel="apple-touch-icon" sizes="180x180" href="{{ favicon_path }}/apple-icon-180x180.png{{ favicon_version }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ favicon_path }}/favicon-32x32.png{{ favicon_version }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ favicon_path }}/favicon-16x16.png{{ favicon_version }}">
{% if site.pwa.enabled %}
<link rel="manifest" href="{{ favicon_path }}/manifest.json{{ favicon_version }}">
{% endif %}
<link rel="shortcut icon" href="{{ favicon_path }}/favicon.ico{{ favicon_version }}">
<meta name="apple-mobile-web-app-title" content="{{ site.title }}">
<meta name="application-name" content="{{ site.title }}">
<meta name="msapplication-TileColor" content="#da532c">
<meta name="msapplication-config" content="{{ favicon_path }}/browserconfig.xml{{ favicon_version }}">
<meta name="theme-color" content="#ffffff">
